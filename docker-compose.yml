services:
  zsxq-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zsxq-agent
    restart: unless-stopped
    ports:
      - "3002:8100"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
